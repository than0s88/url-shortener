# Production compose file for the URL Shortener.
# Single command for both local Windows testing AND the production VM:
#
#     docker compose up -d --build
#
# Reads from a `.env` file in the same directory for both:
#   - build-time substitution (NEXT_PUBLIC_BASE_URL)
#   - runtime env vars passed into the container (env_file)
#
# DATABASE_PATH is set explicitly in the `environment` block here (not .env)
# so the in-container path always points at the mounted volume — independent
# of whatever .env says (which may use a relative path for local pnpm dev).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Inlined into the client bundle at build time.
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    image: url-shortener:latest
    container_name: url-shortener
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # In-container path — overrides whatever DATABASE_PATH is in .env.
      DATABASE_PATH: /var/lib/url-shortener/urls.db
    # Bind only to localhost. Nginx on the host (or in front of Docker) is
    # the public entry point on port 80; external traffic must go through it.
    ports:
      - "127.0.0.1:3000:3000"
    # Named docker volume — works on Windows, macOS, and Linux without any
    # host directory setup. Stored under /var/lib/docker/volumes/ on Linux,
    # inside the WSL2 VM on Windows. Persistent across container removes
    # and host reboots.
    volumes:
      - url-shortener-data:/var/lib/url-shortener

volumes:
  url-shortener-data:
